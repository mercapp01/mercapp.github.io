<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MercApp · Restablecer contraseña</title>
  <style>
    :root{--green:#1f7a44}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      background:#f3f5f3;color:#1b211c;min-height:100vh;display:grid;place-items:center;padding:20px}
    .card{background:#fff;border:1px solid #e3e6e3;border-radius:18px;max-width:420px;width:100%;
      padding:30px 26px;box-shadow:0 18px 50px rgba(0,0,0,.10)}
    .logo{width:54px;height:54px;border-radius:14px;background:var(--green);color:#fff;
      display:grid;place-items:center;font-size:26px;margin:0 auto 12px;font-weight:800}
    h2{margin:0 0 4px;font-size:22px;text-align:center}
    .sub{color:#6b756e;font-size:13px;margin:0 0 18px;text-align:center}
    label{display:block;font-size:13px;font-weight:600;margin:12px 0 6px}
    input{width:100%;padding:12px 14px;border:1px solid #d7dad7;border-radius:12px;font-size:16px;font-family:inherit;background:#fff;color:inherit}
    button{font-family:inherit;cursor:pointer;border:none;border-radius:12px;padding:13px;font-weight:700;font-size:15px;width:100%;margin-top:18px;background:var(--green);color:#fff}
    button:hover{filter:brightness(.96)}
    .msg{font-size:13px;text-align:center;margin-top:14px;min-height:18px}
    .msg.err{color:#c0392b}.msg.ok{color:var(--green)}
    a{color:var(--green);font-weight:700;text-decoration:none}
    @media(prefers-color-scheme:dark){
      body{background:#0c0d0c;color:#f0f2f0}.card{background:#161816;border-color:#2a2d2a;box-shadow:none}
      input{background:#0f110f;border-color:#2a2d2a;color:#f0f2f0}
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">M</div>
    <h2>Restablecer contraseña</h2>
    <p class="sub">Crea una nueva contraseña para tu cuenta</p>
    <div id="form">
      <label for="pw1">Nueva contraseña</label>
      <input id="pw1" type="password" placeholder="mínimo 6 caracteres" autocomplete="new-password">
      <label for="pw2">Repite la contraseña</label>
      <input id="pw2" type="password" placeholder="repite la contraseña" autocomplete="new-password">
      <button id="save">Guardar contraseña</button>
      <p class="msg" id="msg"></p>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
    const SUPABASE_URL = "https://mohbirhrtbgilwtuxdcu.supabase.co";
    const SUPABASE_KEY = "sb_publishable_TpSVjpmseRSdp6JnTcm4nw_CSvh_9Ko";
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const $ = (id) => document.getElementById(id);
    const setMsg = (t, ok) => { const m = $("msg"); m.textContent = t; m.className = "msg " + (ok ? "ok" : "err"); };

    let canReset = false;
    // El enlace del correo trae el token de recuperación; supabase emite PASSWORD_RECOVERY
    supabase.auth.onAuthStateChange((event) => {
      if (event === "PASSWORD_RECOVERY") canReset = true;
    });
    // por si el evento ya pasó: si hay sesión de recuperación, permitir
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) canReset = true;
      if (!canReset) setMsg("Abre esta página desde el enlace de tu correo de recuperación.", false);
    })();

    $("save").onclick = async () => {
      const p1 = $("pw1").value.trim(), p2 = $("pw2").value.trim();
      if (p1.length < 6) return setMsg("La contraseña debe tener al menos 6 caracteres.", false);
      if (p1 !== p2) return setMsg("Las contraseñas no coinciden.", false);
      const { error } = await supabase.auth.updateUser({ password: p1 });
      if (error) return setMsg("Error: " + error.message, false);
      setMsg("¡Contraseña actualizada! Redirigiendo…", true);
      await supabase.auth.signOut();
      setTimeout(() => { window.location.href = "index.html"; }, 1500);
    };
  </script>
</body>
</html>
