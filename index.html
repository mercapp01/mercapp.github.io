<!doctype html>
<html lang="es" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MercApp · Mercados cerca de ti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://unpkg.com" crossorigin>
<link rel="stylesheet" media="print" onload="this.media='all'" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap"></noscript>
<!-- Leaflet (OpenStreetMap) se carga de forma diferida, solo al abrir el mapa -->
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <div class="topbar">
    <button class="logo" onclick="go('home')"><span class="logo-img"></span><span class="logo-txt">MercApp</span></button>
    <div class="search"><input id="searchInput" placeholder="Buscar productos por nombre…" oninput="onSearch(this.value)"></div>
    <div class="actions">
      <button class="iconbtn" id="msgIndicator" title="Mensajes" onclick="openMessages()">💬<span class="badge hidden" id="msgBadge">0</span></button>
      <button class="iconbtn" title="Modo oscuro" onclick="toggleTheme()" id="themeBtn">🌙</button>
      <button class="iconbtn" title="Configuración" onclick="openGear()">⚙️</button>
      <button class="iconbtn" id="cartBtn" title="Carrito" onclick="go('cart')">🛒<span class="badge hidden" id="cartBadge">0</span></button>
    </div>
  </div>
</header>

<main id="app"></main>

<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script src="app.js"></script>
</body>
</html>
