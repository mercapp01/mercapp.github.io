<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MercApp · Dashboard</title>
  <style>
    :root{--green:#1f7a44}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      background:#f3f5f3;color:#1b211c;min-height:100vh;display:grid;place-items:center;padding:20px}
    .card{background:#fff;border:1px solid #e3e6e3;border-radius:18px;max-width:420px;width:100%;
      padding:30px 26px;box-shadow:0 18px 50px rgba(0,0,0,.10);text-align:center}
    .logo{width:54px;height:54px;border-radius:14px;background:var(--green);color:#fff;
      display:grid;place-items:center;font-size:26px;margin:0 auto 12px;font-weight:800}
    h2{margin:0 0 4px;font-size:22px}
    .sub{color:#6b756e;font-size:13px;margin:0 0 18px}
    .row{display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid #eee;font-size:14px;text-align:left}
    .row span{color:#6b756e}.row b{word-break:break-all}
    .badge{display:inline-block;background:#e6f3ea;color:var(--green);border-radius:999px;padding:3px 12px;font-weight:700;font-size:13px}
    button{font-family:inherit;cursor:pointer;border:none;border-radius:12px;padding:13px;font-weight:700;font-size:15px;width:100%;margin-top:18px}
    .logout{background:var(--green);color:#fff}
    .logout:hover{filter:brightness(.95)}
    .back{background:#eef0ee;color:#1b211c;margin-top:10px}
    .muted{color:#9aa39c;font-size:12px;margin-top:16px}
    @media(prefers-color-scheme:dark){
      body{background:#0c0d0c;color:#f0f2f0}.card{background:#161816;border-color:#2a2d2a;box-shadow:none}
      .row{border-color:#2a2d2a}.row span{color:#9aa39c}.back{background:#22251f;color:#f0f2f0}.badge{background:#15311f}
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">M</div>
    <h2>Panel de usuario</h2>
    <p class="sub">MercApp</p>
    <div id="content">
      <p class="muted">Cargando sesión…</p>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    // URL + clave PUBLICA (publishable). NUNCA pongas aquí la clave secreta (sb_secret_...).
    const SUPABASE_URL = "https://mohbirhrtbgilwtuxdcu.supabase.co";
    const SUPABASE_KEY = "sb_publishable_TpSVjpmseRSdp6JnTcm4nw_CSvh_9Ko";
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const $ = (id) => document.getElementById(id);

    async function upsertProfile(user, role = "cliente") {
      try {
        const { error } = await supabase.from("profiles").upsert(
          { id: user.id, role },
          { onConflict: "id" }
        );
        if (error) console.warn("profiles:", error.message);
      } catch (e) { /* la tabla/políticas pueden faltar */ }
    }

    async function showUser(user) {
      // lee el rol guardado (si las políticas lo permiten)
      let role = "cliente";
      try {
        const { data } = await supabase.from("profiles").select("role").eq("id", user.id).single();
        if (data && data.role) role = data.role;
      } catch (e) {}
      $("content").innerHTML = `
        <div class="row"><span>Correo</span><b>${user.email || "—"}</b></div>
        <div class="row"><span>Rol</span><b><span class="badge">${role}</span></b></div>
        <div class="row"><span>ID</span><b style="font-size:12px">${user.id}</b></div>
        <button class="logout" id="btnLogout">Cerrar sesión</button>
        <a href="index.html" style="text-decoration:none"><button class="back">Ir a MercApp</button></a>
      `;
      $("btnLogout").onclick = logout;
    }

    async function logout() {
      await supabase.auth.signOut();
      window.location.href = "index.html";
    }

    // Detecta el login (correo o Google) y crea/actualiza el perfil
    supabase.auth.onAuthStateChange(async (event, session) => {
      if (event === "SIGNED_IN" && session?.user) {
        await upsertProfile(session.user, "cliente");
        showUser(session.user);
      } else if (event === "SIGNED_OUT") {
        window.location.href = "index.html";
      }
    });

    // Carga inicial: si ya hay sesión, muéstrala; si no, vuelve al inicio
    (async () => {
      const { data: { user } } = await supabase.auth.getUser();
      if (user) { await upsertProfile(user, "cliente"); showUser(user); }
      else { window.location.href = "index.html"; }
    })();
  </script>
</body>
</html>
